name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/sqlproject
      BASIC_AUTH_USERNAME: admin
      BASIC_AUTH_PASSWORD: ci-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checks
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
